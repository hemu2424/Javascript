<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="desk">

  <section class="calculator" aria-label="Calculator">
    <header class="brand">
      <span class="brand-name">Calculator</span>
    </header>

    <div class="display" id="display">
      <div class="display-expr" id="expression" aria-live="polite">0</div>
      <div class="display-result" id="result" aria-live="polite"></div>
    </div>

    <div class="keypad">
      <button class="key key--util" data-action="clear">AC</button>
      <button class="key key--util" data-value="(">(</button>
      <button class="key key--util" data-value=")">)</button>
      <button class="key key--op" data-value="%">%</button>

      <button class="key key--num" data-value="7">7</button>
      <button class="key key--num" data-value="8">8</button>
      <button class="key key--num" data-value="9">9</button>
      <button class="key key--op" data-value="/">÷</button>

      <button class="key key--num" data-value="4">4</button>
      <button class="key key--num" data-value="5">5</button>
      <button class="key key--num" data-value="6">6</button>
      <button class="key key--op" data-value="*">×</button>

      <button class="key key--num" data-value="1">1</button>
      <button class="key key--num" data-value="2">2</button>
      <button class="key key--num" data-value="3">3</button>
      <button class="key key--op" data-value="-">−</button>

      <button class="key key--num key--zero" data-value="0">0</button>
      <button class="key key--num" data-value=".">.</button>
      <button class="key key--op" data-value="^">^</button>
      <button class="key key--op" data-value="+">+</button>

      <button class="key key--back" data-action="back">⌫</button>
      <button class="key key--equals" data-action="equals">=</button>
    </div>
  </section>

  <aside class="tape" aria-label="Calculation history">
    <div class="tape-head">
      <span>History</span>
    </div>
    <ul class="tape-body" id="history-list"></ul>
  </aside>

</main>

<script src="script.js"></script>
</body>
</html>
