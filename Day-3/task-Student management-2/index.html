<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header class="header">
    <h1>Student Management System</h1>
    <p class="subtitle">Add, search, filter and manage student records</p>
  </header>

  <!-- Add / Edit form -->
  <section class="card">
    <h2 id="formTitle">Add New Student</h2>
    <form id="studentForm">
      <input type="hidden" id="studentId">

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="e.g. Riya Sharma">
          <span class="error" id="err-name"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="e.g. riya@example.com">
          <span class="error" id="err-email"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" placeholder="e.g. 20">
          <span class="error" id="err-age"></span>
        </div>

        <div class="form-group">
          <label for="course">Course</label>
          <select id="course">
            <option value="">Select course</option>
            <option>Computer Science</option>
            <option>Mathematics</option>
            <option>Physics</option>
            <option>Biology</option>
            <option>Commerce</option>
            <option>Arts</option>
          </select>
          <span class="error" id="err-course"></span>
        </div>

        <div class="form-group">
          <label for="grade">Grade</label>
          <select id="grade">
            <option value="">Not graded</option>
            <option>A+</option>
            <option>A</option>
            <option>B+</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">Add Student</button>
        <button type="button" class="btn btn-secondary" id="cancelEditBtn" hidden>Cancel</button>
      </div>
    </form>
  </section>

  <!-- Search + Filter -->
  <section class="card">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search by name or email...">

      <select id="filterCourse">
        <option value="">All Courses</option>
        <option>Computer Science</option>
        <option>Mathematics</option>
        <option>Physics</option>
        <option>Biology</option>
        <option>Commerce</option>
        <option>Arts</option>
      </select>

      <select id="sortSelect">
        <option value="name-asc">Name (A-Z)</option>
        <option value="name-desc">Name (Z-A)</option>
        <option value="age-asc">Age (Low-High)</option>
        <option value="age-desc">Age (High-Low)</option>
      </select>

      <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>
  </section>

  <!-- Table -->
  <section class="card">
    <table class="student-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Age</th>
          <th>Course</th>
          <th>Grade</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <p class="empty-msg" id="emptyMsg" hidden>No students found.</p>

    <div class="pagination" id="pagination"></div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
